name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.20.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format
        run: npm run format

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit and integration tests
        run: npm run test

      - name: Electron E2E smoke
        run: npm run test:e2e:built

      - name: Package preflight
        run: npm run package:verify

      - name: Release channel check
        run: npm run release:check

      - name: Alpha gate
        run: npm run alpha:verify

      - name: Dependency audit
        run: npm audit

      - name: Build unpacked package artifact
        run: npm run package:dir:built
